services:
  - type: web
    name: auto-wash-api
    runtime: node
    repo: https://github.com/longbai203-del/auto-wash-manager-saas
    plan: free
    region: frankfurt
    buildCommand: |
      npm install
      cd apps/api-server && npm install
    startCommand: node apps/api-server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
