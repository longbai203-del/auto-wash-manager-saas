services:
  - type: web
    name: auto-wash-api
    runtime: node
    repo: https://github.com/longbai203-del/Auto-Wash-Manager-1
    plan: free
    region: frankfurt
    buildCommand: cd apps/api-server && npm install
    startCommand: cd apps/api-server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://auto-wash-manager.onrender.com
